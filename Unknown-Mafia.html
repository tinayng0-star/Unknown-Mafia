<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unknown Mafia - Smart AI Edition</title>
    <style>
        :root {
            --bg-color: #121218;
            --panel-bg: #1e1e28;
            --chat-bg: #181822;
            --text-color: #e0e0e0;
            --accent-color: #e94560;
            --accent-hover: #ff5e78;
            --secondary-color: #0f3460;
            --border-color: #2a2a3c;
            --system-msg: #f39c12;
            --cult-color: #9b59b6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            width: 100vw;
            height: 100vh;
            max-width: 1280px;
            max-height: 850px;
            background-color: var(--panel-bg);
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            background-color: #161620;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title { font-size: 1.2rem; font-weight: bold; color: var(--accent-color); }
        .header-phase { font-size: 1rem; font-weight: 600; padding: 4px 12px; background: var(--secondary-color); border-radius: 20px; }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            border-right: 1px solid var(--border-color);
        }

        .chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-msg {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
            animation: fadeIn 0.15s ease-in-out;
        }

        .chat-msg.system {
            align-self: center;
            background-color: rgba(243, 156, 18, 0.15);
            color: var(--system-msg);
            border: 1px solid rgba(243, 156, 18, 0.3);
            max-width: 90%;
            text-align: center;
            font-weight: 500;
        }

        .chat-msg.ai, .chat-msg.other {
            align-self: flex-start;
            background-color: #252535;
            border-top-left-radius: 2px;
        }

        .chat-msg.player {
            align-self: flex-end;
            background-color: var(--secondary-color);
            border-top-right-radius: 2px;
        }

        .msg-sender {
            font-size: 0.75rem;
            color: #a0a0b0;
            margin-bottom: 3px;
            font-weight: bold;
        }

        .chat-input-area {
            padding: 15px;
            background-color: #161620;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border-color);
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            background-color: #252535;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            outline: none;
        }

        .chat-input-area button {
            padding: 0 20px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-input-area button:hover { background-color: var(--accent-hover); }

        .dashboard-section {
            width: 340px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: var(--panel-bg);
            overflow-y: auto;
        }

        .panel-card {
            background-color: #161620;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }

        .panel-card h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background-color: #252535;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .player-item.dead {
            opacity: 0.4;
            text-decoration: line-through;
        }

        .player-item.me { border: 1px solid var(--accent-color); }
        .player-item.cultist { border: 1px solid var(--cult-color); }

        .btn {
            width: 100%;
            padding: 10px;
            background-color: var(--secondary-color);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
            transition: 0.2s;
        }

        .btn:hover { background-color: #1a4a88; }
        .btn-danger { background-color: var(--accent-color); }
        .btn-danger:hover { background-color: var(--accent-hover); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-card {
            width: 480px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label { font-size: 0.9rem; font-weight: bold; }
        .form-group select, .form-group input {
            padding: 10px;
            background-color: #161620;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 6px;
        }

        .timer-badge {
            display: inline-block;
            padding: 2px 8px;
            background: var(--accent-color);
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 6px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <div class="header-title">🕵️ UNKNOWN MAFIA</div>
            <div id="phase-badge" class="header-phase">대기 중</div>
        </header>

        <div class="main-container">
            <section class="chat-section">
                <div id="chat-history" class="chat-history"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." disabled autocomplete="off">
                    <button id="send-btn" disabled>전송</button>
                </div>
            </section>

            <section class="dashboard-section">
                <div class="panel-card">
                    <h3>내 역할 (My Role)</h3>
                    <div id="my-role-info" style="font-weight: bold; color: var(--accent-color);">게임 시작 전</div>
                    <div id="my-role-desc" style="font-size: 0.8rem; color: #a0a0b0; margin-top: 5px;">-</div>
                </div>

                <div class="panel-card">
                    <h3>생존자 목록 (<span id="alive-count">0</span>)</h3>
                    <div id="player-list" class="player-list"></div>
                </div>

                <div class="panel-card">
                    <h3>특수 능력 / 액션</h3>
                    <div id="action-controls">
                        <p style="font-size: 0.8rem; color: #888;">현재 수행 가능한 액션이 없습니다.</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-card">
            <h2>⚙️ Unknown Mafia 설정</h2>
            
            <div class="form-group">
                <label for="ai-difficulty">🤖 AI 지능 레벨</label>
                <select id="ai-difficulty">
                    <option value="beginner">하수 (기본적인 반응)</option>
                    <option value="normal" selected>중수 (발전된 추리 및 의견 교환)</option>
                    <option value="expert">고수 (논리적 분석 및 의심 추적)</option>
                    <option value="devil">악마 (정보 즉각 계산 및 즉처형)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="total-players">총 플레이어 수 (5~12명)</label>
                <select id="total-players">
                    <option value="5">5명</option>
                    <option value="6">6명</option>
                    <option value="7">7명</option>
                    <option value="8" selected>8명 (기본)</option>
                    <option value="9">9명</option>
                    <option value="10">10명</option>
                    <option value="11">11명</option>
                    <option value="12">12명 (풀 액티브)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="discussion-time">낮 토론 제한 시간: <span id="discussion-time-val" class="timer-badge">45초</span></label>
                <input type="range" id="discussion-time" min="15" max="180" value="45" step="5">
            </div>

            <div class="form-group">
                <label for="vote-time">투표 제한 시간: <span id="vote-time-val" class="timer-badge">30초</span></label>
                <input type="range" id="vote-time" min="15" max="60" value="30" step="5">
            </div>

            <button id="start-game-btn" class="btn btn-danger" style="padding: 14px; font-size: 1.1rem;">게임 시작</button>
        </div>
    </div>

    <script>
        const TEAM = { CITIZEN: '시민팀', MAFIA: '마피아팀', CULT: '교주팀' };

        class Role {
            constructor(name, team, description) {
                this.name = name;
                this.team = team;
                this.description = description;
            }
        }

        class CitizenRole extends Role { constructor() { super('시민', TEAM.CITIZEN, '특수 능력이 없습니다.'); } }
        class PoliceRole extends Role { constructor() { super('경찰', TEAM.CITIZEN, '매일 밤 한 명의 마피아 여부를 조사합니다.'); } }
        class DoctorRole extends Role { constructor() { super('의사', TEAM.CITIZEN, '매일 밤 한 명을 마피아 공격으로부터 보호합니다.'); } }
        class SoldierRole extends Role { constructor() { super('군인', TEAM.CITIZEN, '마피아의 첫 공격을 자동으로 방어합니다.'); this.hasArmor = true; } }
        class MafiaRole extends Role { constructor() { super('마피아', TEAM.MAFIA, '매일 밤 한 명의 플레이어를 처단합니다.'); } }
        class SpyRole extends Role { constructor() { super('스파이', TEAM.MAFIA, '매일 밤 한 명의 정확한 직업을 조사합니다.'); } }
        class CultRole extends Role { constructor() { super('교주', TEAM.CULT, '2일 차 밤부터 플레이어를 포교해 교주팀으로 변경시킵니다.'); } }

        const OPINION_POOLS = {
            agree: [
                "[Target]님의 의견에 전적으로 동의합니다. 흐름이 그쪽을 가리키네요.",
                "저도 그 점이 의문이었는데, 같은 생각이십니다.",
                "앞선 분 의견이 일리가 있네요. 저도 [Target]님 쪽이 수상해 보입니다."
            ],
            disagree: [
                "아닙니다, 그 주장은 비약이 심한 것 같은데요?",
                "글쎄요, 지금 [Target]님을 몰아가는 건 너무 성급한 판단 같습니다.",
                "전 그렇게 생각하지 않습니다. 다른 가능성도 충분히 열어둬야죠."
            ],
            suspect: [
                "그런데 [Target]님은 왜 갑자기 조용하시죠? 답변 좀 해보세요.",
                "지금 발언하시는 태도가 묘하게 회피하는 느낌입니다.",
                "[Target]님의 지난 행동 패턴이 자꾸 마피아처럼 밟히네요."
            ],
            defend: [
                "너무 몰아가시는 것 아닌가요? [Target]님은 무고해 보입니다.",
                "지금 상황에서 그분을 의심하는 건 마피아의 이간질일 수 있습니다.",
                "제 동선과 추리를 볼 때 [Target]님은 절대 마피아가 아닙니다."
            ],
            neutral: [
                "다들 의견이 갈리는데, 조금 더 신중하게 단서를 모아봅시다.",
                "아직 결정적인 증거가 부족하니 확신하기는 이릅니다.",
                "어젯밤 사망자 정황과 발언들을 종합해서 생각해봐야겠네요."
            ]
        };

        const POLICE_DIALECTS = [
            "경찰 조사 결과, 오늘 밤 타겟의 정체가 확실해졌습니다.",
            "진짜 경찰입니다. 조사 완료된 정보를 공유하겠습니다.",
            "판을 바꿀 결정적인 조사 결과가 나왔습니다."
        ];

        class Player {
            constructor(id, name, isAI = true) {
                this.id = id;
                this.displayName = name;
                this.isAI = isAI;
                this.role = null;
                this.isAlive = true;
                this.isCultist = false;
                this.claimedRole = null;
            }
        }

        class AISystem {
            static generateInteractiveSpeech(ai, gameEngine) {
                const diff = gameEngine.settings.aiDifficulty;
                const logs = gameEngine.chatLogs.filter(l => l.phase === 'DAY_DISCUSSION');
                const lastLog = logs.length > 0 ? logs[logs.length - 1] : null;
                const alive = gameEngine.getAlivePlayers();
                const otherAlive = alive.filter(p => p.id !== ai.id);
                const randomTarget = otherAlive[Math.floor(Math.random() * otherAlive.length)];

                // 1. 경찰 역할 공조/공개 로직
                if (ai.role instanceof PoliceRole && gameEngine.lastPoliceResult) {
                    const res = gameEngine.lastPoliceResult;
                    gameEngine.lastPoliceResult = null;
                    ai.claimedRole = '경찰';
                    if (!gameEngine.policeClaimants.includes(ai.id)) gameEngine.policeClaimants.push(ai.id);
                    
                    const phrase = POLICE_DIALECTS[Math.floor(Math.random() * POLICE_DIALECTS.length)];
                    if (res.isMafia) {
                        return `${phrase} ${res.target.displayName}님은 마피아 세력입니다! 다들 투표 동참해주세요.`;
                    } else {
                        return `${phrase} ${res.target.displayName}님은 조사 결과 무고한 시민으로 확인되었습니다.`;
                    }
                }

                // 2. 고수/악마 난이도에서 알려진 마피아 저격
                if ((diff === 'expert' || diff === 'devil') && gameEngine.knownMafiaId && !(ai.role instanceof MafiaRole) && !(ai.role instanceof SpyRole)) {
                    const mafiaObj = gameEngine.players.find(p => p.id === gameEngine.knownMafiaId);
                    if (mafiaObj && mafiaObj.isAlive) {
                        return `앞서 나온 단서들과 정황을 조합해보면, ${mafiaObj.displayName}님이 범인인 게 명확합니다.`;
                    }
                }

                // 3. 직전 발언 반응형 대화 선정 (중복 방지 필터링 적용)
                let category = 'neutral';
                if (lastLog && lastLog.senderId !== ai.id) {
                    const txt = lastLog.text;
                    const myNum = ai.displayName.replace("AI_", "");
                    
                    if (txt.includes(ai.displayName) || txt.includes(`${myNum}번`) || txt.includes("너") || txt.includes("저기요")) {
                        category = Math.random() < 0.5 ? 'defend' : 'disagree';
                    } else {
                        const rand = Math.random();
                        if (rand < 0.35) category = 'agree';
                        else if (rand < 0.6) category = 'disagree';
                        else if (rand < 0.85) category = 'suspect';
                        else category = 'neutral';
                    }
                }

                const pool = OPINION_POOLS[category] || OPINION_POOLS.neutral;
                let text = pool[Math.floor(Math.random() * pool.length)];

                if (randomTarget) {
                    text = text.replaceAll("[Target]", randomTarget.displayName);
                }

                // 최근 동일 발언 방지 체크
                const recentLogs = logs.slice(-3);
                if (recentLogs.some(l => l.text === text)) {
                    text = OPINION_POOLS.neutral[Math.floor(Math.random() * OPINION_POOLS.neutral.length)];
                    if (randomTarget) text = text.replaceAll("[Target]", randomTarget.displayName);
                }

                return text;
            }
        }

        class GameEngine {
            constructor() {
                this.players = [];
                this.phase = 'WAITING';
                this.dayCount = 0;
                this.chatLogs = [];
                this.settings = { totalPlayers: 8, discussionTime: 45, voteTime: 30, aiDifficulty: 'normal' };
                this.nightActions = { mafiaTarget: null, policeTarget: null, doctorTarget: null, spyTarget: null, cultTarget: null };
                this.lastPoliceResult = null;
                this.knownMafiaId = null;
                this.policeClaimants = [];
                this.ui = null;
                this.discussionTimeoutId = null;
                this.voteTimeoutId = null;
                this.speechIntervalId = null;
                this.isSpeaking = false;
            }

            setUI(ui) { this.ui = ui; }

            initGame(config) {
                this.clearAllTimers();
                this.settings = { ...this.settings, ...config };
                this.players = [];
                this.chatLogs = [];
                this.dayCount = 0;
                this.knownMafiaId = null;
                this.policeClaimants = [];

                const human = new Player('p1', '나(Player)', false);
                this.players.push(human);

                for (let i = 2; i <= this.settings.totalPlayers; i++) {
                    const ai = new Player(`p${i}`, `AI_${i}`, true);
                    this.players.push(ai);
                }

                this.assignRoles();

                this.ui.addSystemMessage(`🎮 게임 시작! (난이도: ${this.getDiffName(this.settings.aiDifficulty)}, 총 ${this.players.length}명)`);
                this.ui.updatePlayerList(this.players);
                this.ui.updateMyRole(this.players[0]);

                this.startNightPhase();
            }

            clearAllTimers() {
                if (this.discussionTimeoutId) clearTimeout(this.discussionTimeoutId);
                if (this.voteTimeoutId) clearTimeout(this.voteTimeoutId);
                if (this.speechIntervalId) clearInterval(this.speechIntervalId);
                this.discussionTimeoutId = null;
                this.voteTimeoutId = null;
                this.speechIntervalId = null;
                this.isSpeaking = false;
            }

            getDiffName(diff) {
                switch(diff) {
                    case 'beginner': return '하수';
                    case 'normal': return '중수';
                    case 'expert': return '고수';
                    case 'devil': return '악마';
                    default: return '중수';
                }
            }

            assignRoles() {
                let pool = [new PoliceRole(), new DoctorRole(), new SoldierRole(), new MafiaRole()];
                if (this.players.length >= 8) pool.push(new SpyRole());
                if (this.players.length >= 10) pool.push(new CultRole());

                const mafiaCount = Math.max(1, Math.floor(this.players.length / 4)) - (pool.some(r => r instanceof MafiaRole) ? 1 : 0);
                for (let i = 0; i < mafiaCount; i++) pool.push(new MafiaRole());
                while (pool.length < this.players.length) pool.push(new CitizenRole());

                pool.sort(() => Math.random() - 0.5);
                this.players.forEach((p, idx) => p.role = pool[idx]);
            }

            getAlivePlayers() { return this.players.filter(p => p.isAlive); }

            logChat(senderId, senderName, text) {
                this.chatLogs.push({ senderId, senderName, text, phase: this.phase, day: this.dayCount, timestamp: Date.now() });
            }

            startNightPhase() {
                this.clearAllTimers();
                this.phase = 'NIGHT';
                this.dayCount++;
                this.ui.setPhaseBadge(`🌙 Night ${this.dayCount}`);
                this.ui.addSystemMessage(`\n🌙 밤이 되었습니다.`);

                this.nightActions = { mafiaTarget: null, policeTarget: null, doctorTarget: null, spyTarget: null, cultTarget: null };

                const human = this.players[0];
                if (human.isAlive && !(human.role instanceof CitizenRole) && !(human.role instanceof SoldierRole)) {
                    this.ui.renderNightActionUI(human, this.getAlivePlayers(), this.players, this.dayCount);
                } else {
                    this.ui.renderEmptyActionUI("밤 능력이 진행 중입니다...");
                }

                this.processAINightActions();

                this.discussionTimeoutId = setTimeout(() => {
                    if (this.phase === 'NIGHT') this.resolveNightPhase();
                }, 4000);
            }

            processAINightActions() {
                const alive = this.getAlivePlayers();
                const diff = this.settings.aiDifficulty;

                this.players.filter(p => p.isAI && p.isAlive).forEach(ai => {
                    const mafiaTargets = alive.filter(p => p.id !== ai.id && p.role.team !== TEAM.MAFIA);
                    const normalTargets = alive.filter(p => p.id !== ai.id);
                    const cultTargets = alive.filter(p => p.id !== ai.id && !p.isCultist && !(p.role instanceof CultRole));

                    const randomMafiaTarget = mafiaTargets.length > 0 ? mafiaTargets[Math.floor(Math.random() * mafiaTargets.length)] : normalTargets[0];
                    const randomTarget = normalTargets.length > 0 ? normalTargets[Math.floor(Math.random() * normalTargets.length)] : null;
                    const randomCultTarget = cultTargets.length > 0 ? cultTargets[Math.floor(Math.random() * cultTargets.length)] : null;

                    if (ai.role instanceof MafiaRole && !this.nightActions.mafiaTarget && randomMafiaTarget) {
                        this.nightActions.mafiaTarget = randomMafiaTarget;
                    } else if (ai.role instanceof PoliceRole && !this.nightActions.policeTarget && randomTarget) {
                        this.nightActions.policeTarget = randomTarget;
                    } else if (ai.role instanceof DoctorRole && !this.nightActions.doctorTarget && randomTarget) {
                        const humanTarget = alive.find(p => !p.isAI);
                        this.nightActions.doctorTarget = (diff !== 'beginner' && humanTarget && Math.random() < 0.6) ? humanTarget : randomTarget;
                    } else if (ai.role instanceof SpyRole && !this.nightActions.spyTarget && randomTarget) {
                        this.nightActions.spyTarget = randomTarget;
                    } else if (ai.role instanceof CultRole && this.dayCount >= 2 && !this.nightActions.cultTarget && randomCultTarget) {
                        this.nightActions.cultTarget = randomCultTarget;
                    }
                });
            }

            resolveNightPhase() {
                this.clearAllTimers();
                this.ui.addSystemMessage(`\n🌅 아침이 밝았습니다.`);

                let killedPlayer = this.nightActions.mafiaTarget;
                let doctorSaved = false;

                if (this.nightActions.policeTarget) {
                    const target = this.nightActions.policeTarget;
                    const isMafia = target.role.team === TEAM.MAFIA;
                    this.lastPoliceResult = { target, isMafia };
                    if (isMafia) this.knownMafiaId = target.id;
                }

                if (this.nightActions.cultTarget) {
                    const cultTarget = this.nightActions.cultTarget;
                    if (!cultTarget.isCultist && !(cultTarget.role instanceof CultRole)) {
                        cultTarget.isCultist = true;
                        this.ui.addSystemMessage(`🔮 누군가가 어둠의 포교를 당했습니다.`);
                    }
                }

                if (killedPlayer && this.nightActions.doctorTarget && killedPlayer.id === this.nightActions.doctorTarget.id) {
                    doctorSaved = true;
                    killedPlayer = null;
                }

                if (killedPlayer && killedPlayer.role instanceof SoldierRole && killedPlayer.role.hasArmor) {
                    killedPlayer.role.hasArmor = false;
                    this.ui.addSystemMessage(`🛡️ 군인이 마피아 공격을 방어했습니다!`);
                    killedPlayer = null;
                }

                if (killedPlayer) {
                    killedPlayer.isAlive = false;
                    this.ui.addSystemMessage(`💀 ${killedPlayer.displayName}님이 사망했습니다.`);
                } else if (doctorSaved) {
                    this.ui.addSystemMessage(`🩺 의사가 사망자를 살려냈습니다.`);
                } else {
                    this.ui.addSystemMessage(`✨ 아무도 죽지 않았습니다.`);
                }

                this.ui.updatePlayerList(this.players);

                if (this.checkWinCondition()) return;

                this.startDayDiscussion();
            }

            startDayDiscussion() {
                this.clearAllTimers();
                this.phase = 'DAY_DISCUSSION';
                this.ui.setPhaseBadge(`☀️ Day ${this.dayCount} (토론)`);
                this.ui.enableChatInput(true);
                this.ui.addSystemMessage(`💬 토론 시작 (${this.settings.discussionTime}초)`);

                const discussionEndTime = Date.now() + (this.settings.discussionTime * 1000);
                const diff = this.settings.aiDifficulty;
                const delayFactor = diff === 'devil' ? 3000 : (diff === 'expert' ? 4000 : 5000);

                const triggerAISpeak = () => {
                    if (this.phase !== 'DAY_DISCUSSION' || Date.now() >= discussionEndTime) return;
                    if (this.isSpeaking) return;

                    const aliveAIs = this.getAlivePlayers().filter(p => p.isAI);
                    if (aliveAIs.length === 0) return;

                    let speaker = null;
                    if (this.lastPoliceResult) {
                        speaker = aliveAIs.find(ai => ai.role instanceof PoliceRole) || aliveAIs[0];
                    } else {
                        // 직전에 말한 AI와 겹치지 않도록 필터링
                        const lastMsg = this.chatLogs.slice(-1)[0];
                        const availableAIs = lastMsg ? aliveAIs.filter(ai => ai.id !== lastMsg.senderId) : aliveAIs;
                        speaker = availableAIs.length > 0 ? availableAIs[Math.floor(Math.random() * availableAIs.length)] : aliveAIs[0];
                    }

                    this.isSpeaking = true;
                    const msg = AISystem.generateInteractiveSpeech(speaker, this);
                    
                    if (msg) {
                        this.logChat(speaker.id, speaker.displayName, msg);
                        this.ui.addChatMessage(speaker.displayName, msg, 'ai');
                    }

                    setTimeout(() => {
                        this.isSpeaking = false;
                    }, 1200);
                };

                // 첫 발언 타이머
                this.discussionTimeoutId = setTimeout(() => triggerAISpeak(), 1500);

                // 주기적 발언 타이머 (인터벌로 관리하여 중복 발화 및 꼬임 완전 방지)
                this.speechIntervalId = setInterval(() => {
                    if (this.phase !== 'DAY_DISCUSSION' || Date.now() >= discussionEndTime) {
                        this.clearAllTimers();
                        return;
                    }
                    triggerAISpeak();
                }, delayFactor);

                // 토론 종료 타이머
                setTimeout(() => {
                    if (this.phase === 'DAY_DISCUSSION') {
                        this.clearAllTimers();
                        this.ui.addSystemMessage(`\n⏰ 토론 종료. 투표를 시작합니다.`);
                        this.startVotePhase();
                    }
                }, this.settings.discussionTime * 1000);
            }

            triggerImmediateAIResponse() {
                if (this.phase === 'DAY_DISCUSSION' && !this.isSpeaking) {
                    const aliveAIs = this.getAlivePlayers().filter(p => p.isAI);
                    if (aliveAIs.length === 0) return;
                    const targetAI = aliveAIs[Math.floor(Math.random() * aliveAIs.length)];

                    this.isSpeaking = true;
                    setTimeout(() => {
                        if (this.phase === 'DAY_DISCUSSION') {
                            const msg = AISystem.generateInteractiveSpeech(targetAI, this);
                            if (msg) {
                                this.logChat(targetAI.id, targetAI.displayName, msg);
                                this.ui.addChatMessage(targetAI.displayName, msg, 'ai');
                            }
                        }
                        this.isSpeaking = false;
                    }, 600);
                }
            }

            startVotePhase() {
                this.clearAllTimers();
                this.phase = 'VOTE';
                this.ui.setPhaseBadge(`⚖️ Day ${this.dayCount} (투표)`);
                this.ui.addSystemMessage(`🗳️ 투표 진행 중 (${this.settings.voteTime}초)`);

                const votes = {};
                const alive = this.getAlivePlayers();
                alive.forEach(p => votes[p.id] = 0);
                let skipVotes = 0;
                let humanVoted = false;
                const diff = this.settings.aiDifficulty;

                this.ui.renderVoteUI(alive, (votedId) => {
                    if (!humanVoted) {
                        humanVoted = true;
                        if (votedId) {
                            votes[votedId]++;
                            const targetPlayer = this.players.find(p => p.id === votedId);
                            this.ui.addSystemMessage(`👉 내 선택: ${targetPlayer ? targetPlayer.displayName : ''}`);
                        } else {
                            this.ui.addSystemMessage(`👉 내 선택: 기권`);
                        }
                    }
                });

                // AI 지능형 투표 로직 (경찰 정보 및 마피아 협공 반영)
                alive.filter(p => p.isAI).forEach(ai => {
                    let voted = false;
                    const accuracyThreshold = diff === 'devil' ? 1.0 : (diff === 'expert' ? 0.95 : (diff === 'normal' ? 0.8 : 0.4));
                    
                    if (ai.role.team === TEAM.MAFIA) {
                        // 마피아는 시민 중 한 명을 집중 타겟팅
                        const citizenTargets = alive.filter(p => p.role.team !== TEAM.MAFIA);
                        if (citizenTargets.length > 0) {
                            const target = citizenTargets[Math.floor(Math.random() * citizenTargets.length)];
                            votes[target.id]++;
                            voted = true;
                        }
                    } else if (this.knownMafiaId && alive.some(p => p.id === this.knownMafiaId) && Math.random() < accuracyThreshold) {
                        votes[this.knownMafiaId]++;
                        voted = true;
                    }

                    if (!voted) {
                        if (Math.random() < (diff === 'beginner' ? 0.3 : 0.15)) skipVotes++;
                        else votes[alive[Math.floor(Math.random() * alive.length)].id]++;
                    }
                });

                this.voteTimeoutId = setTimeout(() => {
                    if (this.phase === 'VOTE') this.resolveVote(votes, skipVotes);
                }, this.settings.voteTime * 1000);
            }

            resolveVote(votes, skipVotes) {
                this.clearAllTimers();
                this.ui.enableChatInput(false);
                let maxVote = 0;
                let executedId = null;
                let isTie = false;

                for (let id in votes) {
                    if (votes[id] > maxVote) {
                        maxVote = votes[id];
                        executedId = id;
                        isTie = false;
                    } else if (votes[id] === maxVote && maxVote > 0) {
                        isTie = true;
                    }
                }

                if (skipVotes >= maxVote || isTie || maxVote <= 1) {
                    this.ui.addSystemMessage(`⚖️ 동률 또는 기권으로 처형이 부결되었습니다.`);
                } else if (executedId) {
                    const executed = this.players.find(p => p.id === executedId);
                    if (executed) {
                        executed.isAlive = false;
                        this.ui.addSystemMessage(`⚰️ ${executed.displayName}님이 처형되었습니다.`);
                        if (this.knownMafiaId === executedId) this.knownMafiaId = null;
                    }
                }

                this.ui.updatePlayerList(this.players);

                if (this.checkWinCondition()) return;

                this.discussionTimeoutId = setTimeout(() => this.startNightPhase(), 3000);
            }

            checkWinCondition() {
                const alive = this.getAlivePlayers();
                const mafiaCount = alive.filter(p => p.role.team === TEAM.MAFIA).length;
                const cultAlive = alive.filter(p => p.isCultist || p.role instanceof CultRole);

                let winner = null;
                if (cultAlive.length === alive.length && alive.length > 0) winner = "🔮 교주팀 승리!";
                else if (mafiaCount === 0) winner = "🕊️ 시민팀 승리!";
                else if (mafiaCount >= (alive.length - mafiaCount)) winner = "🔪 마피아팀 승리!";

                if (winner) {
                    this.clearAllTimers();
                    this.phase = 'END';
                    this.ui.setPhaseBadge(`🏆 게임 종료`);
                    this.ui.addSystemMessage(`\n🎉 ${winner}`);
                    return true;
                }
                return false;
            }
        }

        class UISystem {
            constructor(gameEngine) {
                this.engine = gameEngine;
                this.initDOM();
                this.bindEvents();
            }

            initDOM() {
                this.chatHistory = document.getElementById('chat-history');
                this.chatInput = document.getElementById('chat-input');
                this.sendBtn = document.getElementById('send-btn');
                this.phaseBadge = document.getElementById('phase-badge');
                this.playerListEl = document.getElementById('player-list');
                this.aliveCountEl = document.getElementById('alive-count');
                this.myRoleInfo = document.getElementById('my-role-info');
                this.myRoleDesc = document.getElementById('my-role-desc');
                this.actionControls = document.getElementById('action-controls');
                this.modal = document.getElementById('settings-modal');
            }

            bindEvents() {
                const discRange = document.getElementById('discussion-time');
                const discVal = document.getElementById('discussion-time-val');
                if (discRange && discVal) {
                    discRange.addEventListener('input', (e) => {
                        discVal.textContent = `${e.target.value}초`;
                    });
                }

                const voteRange = document.getElementById('vote-time');
                const voteVal = document.getElementById('vote-time-val');
                if (voteRange && voteVal) {
                    voteRange.addEventListener('input', (e) => {
                        voteVal.textContent = `${e.target.value}초`;
                    });
                }

                const startBtn = document.getElementById('start-game-btn');
                if (startBtn) {
                    startBtn.addEventListener('click', () => {
                        const diffEl = document.getElementById('ai-difficulty');
                        const totalPlayersEl = document.getElementById('total-players');
                        const discTimeEl = document.getElementById('discussion-time');
                        const voteTimeEl = document.getElementById('vote-time');

                        const config = {
                            aiDifficulty: diffEl ? diffEl.value : 'normal',
                            totalPlayers: totalPlayersEl ? parseInt(totalPlayersEl.value) : 8,
                            discussionTime: discTimeEl ? parseInt(discTimeEl.value) : 45,
                            voteTime: voteTimeEl ? parseInt(voteTimeEl.value) : 30
                        };

                        if (this.modal) {
                            this.modal.style.display = 'none';
                        }
                        this.engine.initGame(config);
                    });
                }

                if (this.sendBtn) {
                    this.sendBtn.addEventListener('click', () => this.handleUserChat());
                }
                if (this.chatInput) {
                    this.chatInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') this.handleUserChat();
                    });
                }
            }

            handleUserChat() {
                if (!this.chatInput) return;
                const text = this.chatInput.value.trim();
                if (!text) return;

                if (text.includes("경찰") || text.includes("경임") || text.includes("조사")) {
                    if (!this.engine.policeClaimants.includes('p1')) this.engine.policeClaimants.push('p1');
                }

                this.engine.logChat('p1', '나(Player)', text);
                this.addChatMessage('나(Player)', text, 'player');
                this.chatInput.value = '';

                this.engine.triggerImmediateAIResponse();
            }

            addSystemMessage(msg) {
                if (!this.chatHistory) return;
                const div = document.createElement('div');
                div.className = 'chat-msg system';
                div.innerText = msg;
                this.chatHistory.appendChild(div);
                this.chatHistory.scrollTop = this.chatHistory.scrollHeight;
            }

            addChatMessage(sender, msg, type = 'other') {
                if (!this.chatHistory) return;
                const div = document.createElement('div');
                div.className = `chat-msg ${type}`;
                div.innerHTML = `<div class="msg-sender">${sender}</div><div>${msg}</div>`;
                this.chatHistory.appendChild(div);
                this.chatHistory.scrollTop = this.chatHistory.scrollHeight;
            }

            setPhaseBadge(text) {
                if (this.phaseBadge) this.phaseBadge.textContent = text;
            }

            enableChatInput(enable) {
                if (this.chatInput) this.chatInput.disabled = !enable;
                if (this.sendBtn) this.sendBtn.disabled = !enable;
            }

            updatePlayerList(players) {
                if (!this.playerListEl || !this.aliveCountEl) return;
                this.playerListEl.innerHTML = '';
                let aliveNum = 0;

                players.forEach(p => {
                    if (p.isAlive) aliveNum++;
                    const item = document.createElement('div');
                    item.className = `player-item ${!p.isAlive ? 'dead' : ''} ${!p.isAI ? 'me' : ''} ${p.isCultist ? 'cultist' : ''}`;
                    item.innerHTML = `
                        <span>${p.displayName} ${!p.isAI ? '(나)' : ''}</span>
                        <span>${p.isAlive ? '🟢 생존' : '💀 사망'}</span>
                    `;
                    this.playerListEl.appendChild(item);
                });
                this.aliveCountEl.textContent = aliveNum;
            }

            updateMyRole(player) {
                if (this.myRoleInfo) this.myRoleInfo.textContent = `${player.role.name} (${player.role.team})`;
                if (this.myRoleDesc) this.myRoleDesc.textContent = player.role.description;
            }

            renderNightActionUI(human, alivePlayers, allPlayers, dayCount) {
                if (!this.actionControls) return;
                this.actionControls.innerHTML = '';
                let targets = alivePlayers.filter(p => p.id !== human.id);

                if (human.role instanceof MafiaRole || human.role instanceof SpyRole) {
                    targets = targets.filter(p => p.role.team !== TEAM.MAFIA);
                }
                if (human.role instanceof CultRole && dayCount < 2) {
                    this.renderEmptyActionUI("교주 능력은 2일 차 밤부터 사용 가능합니다.");
                    return;
                }
                if (human.role instanceof CultRole) {
                    targets = targets.filter(p => !p.isCultist && !(p.role instanceof CultRole));
                }

                if (targets.length === 0) {
                    this.renderEmptyActionUI("사용할 수 있는 대상이 없습니다.");
                    return;
                }

                const select = document.createElement('select');
                select.style.width = '100%';
                select.style.padding = '8px';
                select.style.marginBottom = '8px';

                targets.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.displayName;
                    select.appendChild(opt);
                });

                const btn = document.createElement('button');
                btn.className = 'btn btn-danger';
                btn.textContent = `${human.role.name} 능력 사용`;

                btn.onclick = () => {
                    const target = allPlayers.find(p => p.id === select.value);
                    if (human.role instanceof MafiaRole) {
                        this.engine.nightActions.mafiaTarget = target;
                        this.addSystemMessage(`🎯 ${target.displayName}님 타겟 지정 (마피아 공격)`);
                    } else if (human.role instanceof PoliceRole) {
                        this.engine.nightActions.policeTarget = target;
                        const isMafia = target.role.team === TEAM.MAFIA;
                        this.addSystemMessage(`🔍 조사 결과: [${target.displayName}님은 ${isMafia ? '마피아 세력' : '시민 팀'}입니다]`);
                    } else if (human.role instanceof DoctorRole) {
                        this.engine.nightActions.doctorTarget = target;
                        this.addSystemMessage(`🩺 치료 지정: ${target.displayName}`);
                    } else if (human.role instanceof SpyRole) {
                        this.engine.nightActions.spyTarget = target;
                        this.addSystemMessage(`🕵️ 스파이 조사 결과: [${target.displayName}님의 직업은 '${target.role.name}'입니다]`);
                    } else if (human.role instanceof CultRole) {
                        this.engine.nightActions.cultTarget = target;
                        this.addSystemMessage(`🔮 포교 지정: ${target.displayName}`);
                    }
                    btn.disabled = true;
                };

                this.actionControls.appendChild(select);
                this.actionControls.appendChild(btn);
            }

            renderVoteUI(alivePlayers, onVoteCallback) {
                if (!this.actionControls) return;
                this.actionControls.innerHTML = '<p style="font-size: 0.8rem; margin-bottom: 6px;">투표할 대상 선택:</p>';
                
                const skipBtn = document.createElement('button');
                skipBtn.className = 'btn';
                skipBtn.style.marginBottom = '6px';
                skipBtn.textContent = '⚪ 기권';
                skipBtn.onclick = () => {
                    onVoteCallback(null);
                    this.actionControls.innerHTML = '<p style="font-size: 0.8rem; color:#888;">투표 완료</p>';
                };
                this.actionControls.appendChild(skipBtn);

                alivePlayers.forEach(p => {
                    const btn = document.createElement('button');
                    btn.className = 'btn btn-danger';
                    btn.style.marginBottom = '4px';
                    btn.textContent = `${p.displayName} 투표`;
                    btn.onclick = () => {
                        onVoteCallback(p.id);
                        this.actionControls.innerHTML = '<p style="font-size: 0.8rem; color:#888;">투표 완료</p>';
                    };
                    this.actionControls.appendChild(btn);
                });
            }

            renderEmptyActionUI(msg) {
                if (!this.actionControls) return;
                this.actionControls.innerHTML = `<p style="font-size: 0.8rem; color: #888;">${msg}</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const gameEngine = new GameEngine();
            const ui = new UISystem(gameEngine);
            gameEngine.setUI(ui);
        });
    </script>
</body>
</html>
